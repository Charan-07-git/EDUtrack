<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Light Blue Calendar Background -->
  <rect x="30" y="20" width="140" height="90" rx="8" fill="#B2E4E8" />
  <rect x="30" y="20" width="140" height="30" rx="8" fill="#40B0C0" />
  <rect x="30" y="35" width="140" height="15" fill="#40B0C0" />
  <rect x="50" y="10" width="10" height="30" rx="2" fill="#2D8A94" />
  <rect x="140" y="10" width="10" height="30" rx="2" fill="#2D8A94" />
  
  <!-- Calendar Grid lines -->
  <rect x="50" y="65" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="75" y="65" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="100" y="65" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="125" y="65" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="50" y="85" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="75" y="85" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="100" y="85" width="15" height="15" rx="2" fill="#ffffff" />
  <rect x="125" y="85" width="15" height="15" rx="2" fill="#ffffff" />

  <!-- Green Chalkboard Mid-ground -->
  <rect x="50" y="100" width="100" height="55" rx="4" fill="#2E8B57" />
  <rect x="55" y="105" width="90" height="45" rx="2" fill="#3CB371" />
  <rect x="70" y="160" width="60" height="5" rx="2" fill="#A0A0A0" />

  <!-- Chalkboard Accents (Lines/Checkmark) -->
  <path d="M 65 120 L 85 120" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <path d="M 65 130 L 95 130" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <path d="M 65 140 L 80 140" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <path d="M 120 115 L 135 130 L 115 140" stroke="#FFD1DC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Silhouette Figure (Background Right) -->
  <circle cx="170" cy="130" r="10" fill="#D2B48C" />
  <path d="M 170 140 L 170 170 M 170 150 L 155 160 M 170 150 L 185 160 M 170 170 L 155 190 M 170 170 L 185 190" stroke="#404040" stroke-width="4" stroke-linecap="round" />

  <!-- Orange-Haired Figure (Foreground Left) -->
  <!-- Hair -->
  <circle cx="30" cy="125" r="12" fill="#FFA500" />
  <!-- Head -->
  <circle cx="30" cy="130" r="8" fill="#FFD1DC" />
  <!-- Body (Dark Grey Top) -->
  <path d="M 20 140 L 40 140 L 35 170 L 25 170 Z" fill="#4A4A4A" />
  <!-- Legs -->
  <path d="M 25 170 L 20 190 M 35 170 L 40 190" stroke="#4A4A4A" stroke-width="4" stroke-linecap="round" />
  <!-- Pointing Arm -->
  <path d="M 35 150 L 65 125" stroke="#4A4A4A" stroke-width="4" stroke-linecap="round" />

  <!-- Teal Accents / Background Blobs -->
  <circle cx="180" cy="30" r="15" fill="#008080" opacity="0.1" />
  <circle cx="20" cy="170" r="10" fill="#FFB6C1" opacity="0.2" />
</svg>
